{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Delete Task</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <h1>Delete Task</h1>

        <p>Are you sure you want to delete: <strong>{{ task.title }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit">Yes, Delete</button>
        </form>

        <br>
        <a href="/">Cancel</a>
    </div>
</body>
</html>
